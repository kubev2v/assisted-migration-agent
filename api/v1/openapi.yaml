openapi: 3.0.3
info:
  title: Assisted Migration Agent API
  version: v1
servers:
  - url: /api/v1
paths:
  /agent:
    get:
      summary: Get agent status
      operationId: getAgentStatus
      responses:
        '200':
          description: Agent status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentStatus'
        '500':
          description: Internal server error
    post:
      summary: Change agent mode
      operationId: setAgentMode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentModeRequest'
      responses:
        '200':
          description: Mode changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentStatus'
        '400':
          description: Invalid request
        '409':
          description: Conflict
        '500':
          description: Internal server error

  /collector:
    get:
      summary: Get collector status
      operationId: getCollectorStatus
      responses:
        '200':
          description: Collector status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectorStatus'
        '500':
          description: Internal server error
    post:
      summary: Start inventory collection
      operationId: startCollector
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectorStartRequest'
      responses:
        '202':
          description: Collection started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectorStatus'
        '400':
          description: Invalid request
        '409':
          description: Collection already in progress
        '500':
          description: Internal server error
    delete:
      summary: Stop collection
      operationId: stopCollector
      responses:
        '204':
          description: Collection stopped
        '500':
          description: Internal server error

  /inventory:
    get:
      summary: Get collected inventory
      operationId: getInventory
      parameters:
        - name: withAgentId
          in: query
          required: false
          description: If true, include the agentId in the response (Compatible with manual inventory upload).
          schema:
            type: boolean
            default: false
        - name: group_id
          in: query
          required: false
          description: Filter inventory to VMs matching this group's filter expression
          schema:
            type: string
      responses:
        '200':
          description: Collected inventory
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: 'https://raw.githubusercontent.com/kubev2v/migration-planner/main/api/v1alpha1/openapi.yaml#/components/schemas/Inventory'
                  - $ref: 'https://raw.githubusercontent.com/kubev2v/migration-planner/main/api/v1alpha1/openapi.yaml#/components/schemas/UpdateInventory'

        '404':
          description: Inventory not available
        '500':
          description: Internal server error

  /vms:
    get:
      summary: Get list of VMs with filtering and pagination
      operationId: getVMs
      parameters:
        - name: byExpression
          in: query
          description: Filter by expression (matches VMs with the provided expression)
          schema:
            type: string
          example: "exp1"
        - name: sort
          in: query
          description: Sort fields with direction (e.g., "name:asc" or "cluster:desc,name:asc"). Valid fields are name, vCenterState, cluster, diskSize, memory, issues.
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          example: [ "cluster:asc", "name:desc" ]
        - name: page
          in: query
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: pageSize
          in: query
          description: Number of items per page
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: List of VMs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualMachineListResponse'
        '400':
          description: Invalid request parameters
        '500':
          description: Internal server error

  /vms/{id}:
    get:
      summary: Get details about a vm
      operationId: GetVM
      parameters:
        - name: id
          in: path
          required: true
          description: VirtualMachine id
          schema:
            type: string
      responses:
        '200':
          description: VirtualMachine details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualMachineDetail'
        '404':
          description: VirtualMachine not found
        '500':
          description: Internal server error

  /vms/{id}/inspection:
    delete:
      summary: Remove VirtualMachine from inspection queue
      operationId: removeVMFromInspection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: VMs removed from queue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VmInspectionStatus'
        '400':
          description: Inspector not running or VirtualMachine cannot be canceled
        '404':
          description: VirtualMachine not found or not in the queue
        '500':
          description: Internal server error

  /vms/{id}/utilization:
    get:
      summary: Get utilization breakdown for a specific VM
      operationId: getVMUtilization
      parameters:
        - name: id
          in: path
          required: true
          description: VirtualMachine MoRef ID
          schema:
            type: string
      responses:
        '200':
          description: VM utilization details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VmUtilizationDetails'
        '404':
          description: No utilization data found for this VM
        '500':
          description: Internal server error

  /inspector:
    get:
      summary: Get inspector status
      operationId: getInspectorStatus
      parameters:
        - name: includeVddk
          in: query
          required: false
          description: If true, include uploaded VDDK metadata (`version`, `md5`) when present. omitted if VDDK was never uploaded.
          schema:
            type: boolean
            default: false
        - name: includeCredentials
          in: query
          required: false
          description: If true, include configured vCenter URL and username (password is never returned). omitted if was never set.
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Inspector status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InspectorStatus'
        '500':
          description: Internal server error
    post:
      summary: Start inspection for VMs
      operationId: startInspection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Array of VirtualMachine id
              required:
                  - vmIds
              properties:
                vmIds:
                  type: array
                  items:
                    type: string
      responses:
        '202':
          description: Inspection started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InspectorStatus'
        '400':
          description: Invalid request
        '409':
          description: Inspector already running
        '500':
          description: Internal server error
    delete:
      summary: Stop inspector entirely
      operationId: stopInspection
      responses:
        '200':
          description: VMs removed from queue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InspectorStatus'
        '400':
          description: Already in canceling state
        '404':
          description: Inspector not running
        '500':
          description: Internal server error

  /inspector/credentials:
    put:
      summary: Set or replace inspector credentials
      operationId: putInspectorCredentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VcenterCredentials'
      responses:
        "200":
          description: Credentials updated successfully
        "400":
          description: Bad Credentials
        "500":
          description: Internal server error
  /version:
    get:
      summary: Get agent version information
      operationId: getVersion
      responses:
        '200':
          description: Version information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionInfo'

  /inspector/vddk:
    get:
      summary: Get VDDK status
      operationId: getInspectorVddkStatus
      responses:
        '200':
          description: |
            Returns the current properties of the uploaded VMware VDDK tar.
            If the VDDK package has not been uploaded, a 404 response is returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VddkProperties'
        '404':
          description: Vddk not found
        '500':
          description: Internal server error
    put:
      summary: Upload VDDK tarball
      operationId: putInspectorVddk
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: VDDK tarball
      responses:
        '200':
          description: Upload successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VddkProperties'
        '409':
          description: Conflict
        '413':
          description: File exceeds 64MB limit
        '400':
          description: Bad request
        '500':
          description: Internal server error

  /groups:
    get:
      summary: List all groups
      operationId: listGroups
      parameters:
        - name: byName
          in: query
          required: false
          description: Filter groups by name (case-insensitive substring match)
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number (1-indexed)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          description: Number of groups per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: List of groups
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupListResponse'
        '400':
          description: Invalid filter expression
        '500':
          description: Internal server error
    post:
      summary: Create a new group
      operationId: createGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupRequest'
      responses:
        '201':
          description: Group created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '400':
          description: Invalid request (e.g., invalid filter syntax)
        '500':
          description: Internal server error

  /groups/{id}:
    get:
      summary: Get group by ID with its VMs
      operationId: getGroup
      parameters:
        - name: id
          in: path
          required: true
          description: Group ID
          schema:
            type: string
        - name: sort
          in: query
          description: Sort fields with direction (e.g., "name:asc" or "cluster:desc,name:asc"). Valid fields are name, vCenterState, cluster, diskSize, memory, issues.
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          example: [ "cluster:asc", "name:desc" ]
        - name: page
          in: query
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: pageSize
          in: query
          description: Number of items per page
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Group details with VMs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupResponse'
        '404':
          description: Group not found
        '500':
          description: Internal server error
    patch:
      summary: Update group
      operationId: updateGroup
      parameters:
        - name: id
          in: path
          required: true
          description: Group ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGroupRequest'
      responses:
        '200':
          description: Group updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '400':
          description: Invalid request (e.g., invalid filter syntax)
        '404':
          description: Group not found
        '500':
          description: Internal server error
    delete:
      summary: Delete group
      operationId: deleteGroup
      parameters:
        - name: id
          in: path
          required: true
          description: Group ID
          schema:
            type: string
      responses:
        '204':
          description: Group deleted
        '500':
          description: Internal server error

  /rightsizing:
    post:
      summary: Trigger rightsizing metrics collection
      operationId: triggerRightsizingCollection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RightsizingCollectRequest'
      responses:
        '202':
          description: Collection triggered; returns report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RightsizingReportSummary'
        '400':
          description: Invalid request
        '500':
          description: Internal server error
    get:
      summary: List all rightsizing reports
      operationId: listRightsizingReports
      responses:
        '200':
          description: List of rightsizing reports
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RightsizingReportListResponse'
        '500':
          description: Internal server error

  /rightsizing/{id}:
    get:
      summary: Get a specific rightsizing report with full VM metrics
      operationId: getRightsizingReport
      parameters:
        - name: id
          in: path
          required: true
          description: Report UUID
          schema:
            type: string
      responses:
        '200':
          description: Rightsizing report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RightsizingReport'
        '404':
          description: Report not found
        '500':
          description: Internal server error

  /forecaster:
    post:
      summary: Start benchmark
      operationId: startForecaster
      description: Starts async benchmarking for one or more datastore pairs. Credentials can be passed inline or omitted if previously provided in an earlier request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForecasterStartRequest'
      responses:
        '202':
          description: Benchmark started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForecasterStatus'
        '400':
          description: Invalid credentials, validation error, or pair limit exceeded
        '409':
          description: Another benchmark is already running
        '500':
          description: Internal server error
    get:
      summary: Poll forecaster status
      operationId: getForecasterStatus
      description: Returns current service state with per-pair progress details.
      responses:
        '200':
          description: Current forecaster status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForecasterStatus'
    delete:
      summary: Cancel benchmark
      operationId: stopForecaster
      description: Stops the running benchmark. Already-completed runs are preserved in the database.
      responses:
        '202':
          description: Benchmark canceled, service returned to ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForecasterStatus'
        '404':
          description: No benchmark is running
        '500':
          description: Internal server error

  /forecaster/pairs/{name}:
    delete:
      summary: Cancel a single pair
      operationId: stopForecasterPair
      description: Cancels the benchmark for a specific pair by name. The forecaster continues running if other pairs are still active.
      parameters:
        - name: name
          in: path
          required: true
          description: Pair name as specified in the start request
          schema:
            type: string
      responses:
        '202':
          description: Pair canceled
          content:
            application/json:
              schema:
                type: object
                properties:
                  pairName:
                    type: string
                  state:
                    type: string
                    enum: [canceled]
        '404':
          description: No benchmark running, or pair not found / already finished
        '500':
          description: Internal server error

  /forecaster/credentials:
    put:
      summary: Verify vCenter credentials and permissions
      operationId: putForecasterCredentials
      description: >-
        Validates vCenter connectivity and verifies the user has the required
        vSphere privileges for forecaster operations (datastore file management,
        VM provisioning, disk cloning). Verification only — credentials are not saved.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VcenterCredentials'
      responses:
        '200':
          description: Credentials valid and all required privileges are granted
        '400':
          description: Invalid credentials or unreachable vCenter
        '403':
          description: Authentication succeeded but user lacks required privileges
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "insufficient vSphere privileges, missing: [Datastore.AllocateSpace VirtualMachine.Inventory.Create]"
                  missingPrivileges:
                    type: array
                    items:
                      type: string
                    example: ["Datastore.AllocateSpace", "VirtualMachine.Inventory.Create"]
        '500':
          description: Internal server error

  /forecaster/datastores:
    post:
      summary: List available datastores
      operationId: getForecasterDatastores
      description: Returns datastores from the forklift-collected inventory with storage vendor and capability information derived from NAA device identifiers. No vSphere credentials are required.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForecasterDatastoresRequest'
      responses:
        '200':
          description: List of datastores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DatastoreDetail'
        '500':
          description: Internal server error

  /forecaster/capabilities:
    post:
      summary: Compute pair capabilities
      operationId: postForecasterPairCapabilities
      description: Computes which offload methods are feasible for specific source-target datastore pairs based on vendor support and storage array topology derived from the forklift-collected inventory. No vSphere credentials are required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PairCapabilityRequest'
      responses:
        '200':
          description: Capabilities per pair
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PairCapability'
        '400':
          description: Datastore not found
        '500':
          description: Internal server error

  /forecaster/runs:
    get:
      summary: List benchmark runs
      operationId: getForecasterRuns
      description: Returns individual benchmark iterations. Optionally filtered by pair name.
      parameters:
        - name: pairName
          in: query
          required: false
          description: Filter runs by pair name
          schema:
            type: string
      responses:
        '200':
          description: List of benchmark runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BenchmarkRun'
        '500':
          description: Internal server error

  /forecaster/runs/{id}:
    delete:
      summary: Delete a benchmark run
      operationId: deleteForecasterRun
      parameters:
        - name: id
          in: path
          required: true
          description: Run ID
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Run deleted
        '400':
          description: Invalid run ID
        '404':
          description: Run not found
        '500':
          description: Internal server error

  /forecaster/stats:
    get:
      summary: Get throughput statistics
      operationId: getForecasterStats
      description: Returns computed statistics for a datastore pair's benchmark results. Primary endpoint for the UI to display migration time estimates.
      parameters:
        - name: pairName
          in: query
          required: true
          description: Pair name to get statistics for
          schema:
            type: string
      responses:
        '200':
          description: Throughput statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForecastStats'
        '400':
          description: Missing pairName parameter
        '500':
          description: Internal server error

components:
  schemas:
    VddkProperties:
      type: object
      required:
        - version
        - md5
      properties:
        version:
          type: string
          description: The matching vSphere Client version
        md5:
          type: string
          description: md5 sum of the uploaded tarball
        bytes:
          type: integer
          format: int64
          description: provided tarball bytes

    VersionInfo:
      type: object
      required:
        - version
        - gitCommit
        - uiGitCommit
      properties:
        version:
          type: string
          description: Agent version (e.g. v2.0.0)
        gitCommit:
          type: string
          description: Git commit SHA used to build the agent
        uiGitCommit:
          type: string
          description: Git commit SHA of the UI used to build the agent

    CollectorStartRequest:
      allOf:
        - $ref: '#/components/schemas/VcenterCredentials'

    CollectorStatus:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ready
            - connecting
            - collecting
            - parsing
            - collected
            - error
          x-enum-varnames:
            - CollectorStatusStatusReady
            - CollectorStatusStatusConnecting
            - CollectorStatusStatusCollecting
            - CollectorStatusStatusParsing
            - CollectorStatusStatusCollected
            - CollectorStatusStatusError
        error:
          type: string
          description: Error message when status is error

    AgentStatus:
      type: object
      required:
        - mode
        - console_connection
      properties:
        mode:
          type: string
          enum:
            - connected
            - disconnected
          x-enum-varnames:
            - AgentStatusModeConnected
            - AgentStatusModeDisconnected
          description: Target mode for the agent
        console_connection:
          type: string
          enum:
            - disconnected
            - connected
          description: Current console connection status
        error:
          type: string
          description: Connection error description

    AgentModeRequest:
      type: object
      required:
        - mode
      properties:
        mode:
          type: string
          enum:
            - connected
            - disconnected
          x-oapi-codegen-extra-tags:
            binding: "required,oneof=connected disconnected"

    VmInspectionStatus:
      type: object
      required:
        - state
      properties:
        state:
          type: string
          enum:
            - pending
            - running
            - completed
            - canceled
            - error
          x-enum-varnames:
            - VmInspectionStatusStatePending
            - VmInspectionStatusStateRunning
            - VmInspectionStatusStateCompleted
            - VmInspectionStatusStateCanceled
            - VmInspectionStatusStateError
          description: Current inspection state
        error:
          type: string
          description: Error message when state is error
        results:
          type: object
          description: Inspection results

    VmInspectionResults:
      type: object
      description: VirtualMachine Inspection results
      properties:
        concerns:
          type: array
          items:
            $ref: '#/components/schemas/VmInspectionConcern'

    VmInspectionConcern:
      type: object
      description: Represents the structure of vm-migration-detective library inspection concerns
      required:
        - message
        - category
        - label
      properties:
        label:
          type: string
          description: Short label identifying the concern
        message:
          type: string
        category:
          type: string

    VirtualMachine:
      type: object
      required:
        - name
        - id
        - vCenterState
        - cluster
        - datacenter
        - diskSize
        - memory
        - issueCount
      properties:
        name:
          type: string
          description: VirtualMachine name
        id:
          type: string
          description: VirtualMachine ID in vCenter
        vCenterState:
          type: string
          description: vCenter state (e.g., poweredOn, poweredOff, suspended)
        cluster:
          type: string
          description: Cluster name
        datacenter:
          type: string
          description: Datacenter name
        diskSize:
          type: integer
          format: int64
          description: Total disk size in MB
        memory:
          type: integer
          format: int64
          description: Memory size in MB
        issueCount:
          type: integer
          description: Number of issues found for this VirtualMachine
        migratable:
          type: boolean
          description: True if the vm is migratable for MTV. False otherwise
        template:
          type: boolean
          description: True if the vm is a template. False otherwise
        inspectionStatus:
          $ref: '#/components/schemas/VmInspectionStatus'
        inspectionConcernCount:
          type: integer
          description: Number of inspection concerns recorded for the latest persisted inspection result
        tags:
          type: array
          items:
            type: string
          description: Tags aggregated from matching groups
        utilization_cpu_p95:
          type: number
          format: double
          description: CPU utilization at p95 (%); absent when no utilization data
        utilization_mem_p95:
          type: number
          format: double
          description: Memory utilization at p95 (%); absent when no utilization data
        utilization_disk:
          type: number
          format: double
          description: Disk utilization (%); absent when no utilization data
        utilization_confidence:
          type: number
          format: double
          description: Data confidence — sample_count / expected_sample_count × 100

    VirtualMachineDetail:
      type: object
      required:
        - id
        - name
        - powerState
        - connectionState
        - cpuCount
        - coresPerSocket
        - memoryMB
        - disks
        - nics
      properties:
        id:
          type: string
          description: Unique identifier for the VirtualMachine in vCenter
        name:
          type: string
          description: Display name of the VirtualMachine
        uuid:
          type: string
          description: Universally unique identifier assigned by vCenter
        firmware:
          type: string
          description: Firmware type used by the VirtualMachine (bios or efi)
        powerState:
          type: string
          description: Current power state of the VirtualMachine (poweredOn, poweredOff, or suspended)
        connectionState:
          type: string
          description: State of the connection between vCenter and the VirtualMachine's host (connected, disconnected, orphaned, or inaccessible)
        host:
          type: string
          description: Reference to the ESXi host where the VirtualMachine is running
        datacenter:
          type: string
          description: Name of the datacenter containing the VirtualMachine
        cluster:
          type: string
          description: Name of the cluster containing the VirtualMachine
        folder:
          type: string
          description: Reference to the inventory folder containing the VirtualMachine
        cpuCount:
          type: integer
          format: int32
          description: Total number of virtual CPUs allocated to the VirtualMachine
        coresPerSocket:
          type: integer
          format: int32
          description: Number of CPU cores per virtual socket
        cpuAffinity:
          type: array
          items:
            type: integer
            format: int32
          description: List of physical CPU IDs the VirtualMachine is pinned to for scheduling
        memoryMB:
          type: integer
          format: int32
          description: Amount of memory allocated to the VirtualMachine in megabytes
        guestName:
          type: string
          description: Full name of the guest operating system as reported by VMware Tools
        guestId:
          type: string
          description: VMware identifier for the guest OS type (e.g., rhel8_64Guest)
        hostName:
          type: string
          description: Hostname of the guest OS as reported by VMware Tools
        ipAddress:
          type: string
          description: Primary IP address of the guest OS as reported by VMware Tools
        storageUsed:
          type: integer
          format: int64
          description: Total storage space consumed by the VirtualMachine in bytes
        template:
          type: boolean
          description: Whether the VirtualMachine is a template rather than a regular VirtualMachine
        migratable:
          type: boolean
          description: Whether the VirtualMachine can be migrated (true if no critical issues)
        faultToleranceEnabled:
          type: boolean
          description: Whether VMware Fault Tolerance is enabled, which maintains a live shadow VirtualMachine for instant failover
        nestedHVEnabled:
          type: boolean
          description: Whether nested virtualization is enabled, allowing hypervisors to run inside the VirtualMachine
        toolsStatus:
          type: string
          description: Installation status of VMware Tools (toolsNotInstalled, toolsNotRunning, toolsOld, toolsOk)
        toolsRunningStatus:
          type: string
          description: Whether VMware Tools is currently running in the guest OS
        disks:
          type: array
          items:
            $ref: '#/components/schemas/VMDisk'
          description: List of virtual disks attached to the VirtualMachine
        nics:
          type: array
          items:
            $ref: '#/components/schemas/VMNIC'
          description: List of virtual network interface cards attached to the VirtualMachine
        devices:
          type: array
          items:
            $ref: '#/components/schemas/VMDevice'
          description: List of other virtual devices attached to the VirtualMachine
        guestNetworks:
          type: array
          items:
            $ref: '#/components/schemas/GuestNetwork'
          description: Network configuration inside the guest OS as reported by VMware Tools
        issues:
          type: array
          items:
            $ref: '#/components/schemas/VMIssue'
          description: List of issues affecting this VirtualMachine
        inspection:
          $ref: '#/components/schemas/VmInspectionResults'

    VMDisk:
      type: object
      properties:
        key:
          type: integer
          format: int32
          description: Unique key identifying this disk within the VirtualMachine
        file:
          type: string
          description: Path to the VMDK file in the datastore
        capacity:
          type: integer
          format: int64
          description: Disk capacity in bytes
        shared:
          type: boolean
          description: Whether this disk is shared between multiple VMs
        rdm:
          type: boolean
          description: Whether this is a Raw Device Mapping (direct LUN access)
        bus:
          type: string
          description: Bus type (e.g., scsi, ide, sata, nvme)
        mode:
          type: string
          description: Disk mode (e.g., persistent, independent_persistent, independent_nonpersistent)

    VMNIC:
      type: object
      properties:
        mac:
          type: string
          description: MAC address of the virtual NIC
        network:
          type: string
          description: Reference to the network this NIC is connected to
        index:
          type: integer
          description: Index of the NIC within the VirtualMachine

    VMDevice:
      type: object
      properties:
        kind:
          type: string
          description: Type of virtual device (e.g., cdrom, floppy, usb, serial, parallel)

    GuestNetwork:
      type: object
      properties:
        device:
          type: string
          description: Name of the network device inside the guest OS
        mac:
          type: string
          description: MAC address as seen by the guest OS
        ip:
          type: string
          description: IP address assigned to this interface
        prefixLength:
          type: integer
          format: int32
          description: Network prefix length (subnet mask in CIDR notation)
        network:
          type: string
          description: Network name as reported by the guest OS

    VMIssue:
      type: object
      required:
        - label
        - category
        - description
      properties:
        label:
          type: string
          description: Short label describing the issue
        description:
          type: string
          description: Detailed description of the issue with additional context and recommendations
        category:
          type: string
          enum:
            - Critical
            - Warning
            - Information
            - Advisory
            - Error
            - Other
          x-enum-varnames:
            - VMIssueCategoryCritical
            - VMIssueCategoryWarning
            - VMIssueCategoryInformation
            - VMIssueCategoryAdvisory
            - VMIssueCategoryError
            - VMIssueCategoryOther
          description: Severity category of the issue. Unknown categories are mapped to 'Other'.

    VirtualMachineListResponse:
      type: object
      required:
        - vms
        - total
        - page
        - pageCount
      properties:
        vms:
          type: array
          items:
            $ref: '#/components/schemas/VirtualMachine'
        total:
          type: integer
          description: Total number of VMs matching the filter
        page:
          type: integer
          description: Current page number
        pageCount:
          type: integer
          description: Total number of pages

    InspectorStatus:
      type: object
      required:
        - state
      properties:
        state:
          type: string
          enum:
            - ready
            - Initiating
            - running
            - canceled
            - completed
            - error
          x-enum-varnames:
            - InspectorStatusStateReady
            - InspectorStatusStateInitiating
            - InspectorStatusStateRunning
            - InspectorStatusStateCanceled
            - InspectorStatusStateCompleted
            - InspectorStatusStateError
          description: Inspector state
        credentials:
          allOf:
            - $ref: '#/components/schemas/VcenterCredentials'
        vddk:
          allOf:
            - $ref: '#/components/schemas/VddkProperties'
        error:
          type: string
          description: Error message when state is error

    VcenterCredentials:
      required:
        - url
        - username
        - password
      properties:
        url:
          type: string
          format: uri
          description: vCenter URL
          x-oapi-codegen-extra-tags:
            binding: "required,url"
        username:
          type: string
          minLength: 1
          x-oapi-codegen-extra-tags:
            binding: "required,min=1"
        password:
          type: string
          format: password
          minLength: 1
          x-oapi-codegen-extra-tags:
            binding: "required,min=1"

    Group:
      type: object
      required:
        - id
        - name
        - filter
      properties:
        id:
          type: string
          description: Unique group identifier (UUID)
        name:
          type: string
          description: Group display name
        description:
          type: string
          description: Optional group description
        filter:
          type: string
          description: Filter expression (pkg/filter DSL)
          example: "memory >= 8GB and cluster = 'prod'"
        tags:
          type: array
          items:
            type: string
          description: Tags associated with this group (applied to matching VMs)
          example: [ "production", "critical" ]
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the group was created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the group was last updated

    GroupListResponse:
      type: object
      required:
        - groups
        - total
        - page
        - pageCount
      properties:
        groups:
          type: array
          items:
            $ref: '#/components/schemas/Group'
        total:
          type: integer
          description: Total number of groups
        page:
          type: integer
          description: Current page number
        pageCount:
          type: integer
          description: Total number of pages

    GroupResponse:
      type: object
      required:
        - group
        - vms
        - total
        - page
        - pageCount
      properties:
        group:
          $ref: '#/components/schemas/Group'
        vms:
          type: array
          items:
            $ref: '#/components/schemas/VirtualMachine'
        total:
          type: integer
          description: Total number of VMs matching the group's filter
        page:
          type: integer
          description: Current page number
        pageCount:
          type: integer
          description: Total number of pages

    CreateGroupRequest:
      type: object
      required:
        - name
        - filter
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: Group display name
          x-oapi-codegen-extra-tags:
            binding: "required,min=1,max=100"
        description:
          type: string
          maxLength: 500
          description: Optional group description
          x-oapi-codegen-extra-tags:
            binding: "omitempty,max=500"
        filter:
          type: string
          minLength: 1
          description: Filter expression (will be validated)
          x-oapi-codegen-extra-tags:
            binding: "required,min=1"
        tags:
          type: array
          items:
            type: string
            pattern: "^[a-zA-Z0-9_.]+$"
          description: Tags to apply to matching VMs (only alphanumeric, underscore, and dot allowed)
          x-oapi-codegen-extra-tags:
            binding: "omitempty,dive,tag_format"

    UpdateGroupRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: Group display name
          x-oapi-codegen-extra-tags:
            binding: "omitempty,min=1,max=100"
        description:
          type: string
          maxLength: 500
          description: Optional group description
          x-oapi-codegen-extra-tags:
            binding: "omitempty,max=500"
        filter:
          type: string
          minLength: 1
          description: Filter expression (will be validated)
          x-oapi-codegen-extra-tags:
            binding: "omitempty,min=1"
        tags:
          type: array
          items:
            type: string
            pattern: "^[a-zA-Z0-9_.]+$"
          description: Tags to apply to matching VMs (only alphanumeric, underscore, and dot allowed)
          x-oapi-codegen-extra-tags:
            binding: "omitempty,dive,tag_format"

    RightsizingCollectRequest:
      type: object
      required:
        - credentials
      properties:
        credentials:
          $ref: '#/components/schemas/VcenterCredentials'
        lookback_hours:
          type: integer
          description: Lookback window in hours (default 720 = 30 days)
          default: 720
        interval_id:
          type: integer
          description: vSphere historical interval ID in seconds (300=day, 1800=week, 7200=month)
          default: 7200
        name_filter:
          type: string
          description: Filter VMs by name substring
        cluster_id:
          type: string
          description: MoRef value of a ClusterComputeResource to scope discovery (e.g. domain-c123)
        batch_size:
          type: integer
          description: Number of VMs per QueryPerf round-trip
          default: 64
        discover_vms:
          type: boolean
          description: >
            If true, discover VMs live from vSphere.
            If false (default), use the VMs already stored in the local inventory.
          default: false

    RightsizingMetricStats:
      type: object
      required:
        - sample_count
        - average
        - p95
        - p99
        - max
        - latest
      properties:
        sample_count:
          type: integer
        average:
          type: number
          format: double
        p95:
          type: number
          format: double
        p99:
          type: number
          format: double
        max:
          type: number
          format: double
        latest:
          type: number
          format: double

    RightsizingVMReport:
      type: object
      required:
        - name
        - moid
        - metrics
        - warnings
      properties:
        name:
          type: string
        moid:
          type: string
        metrics:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/RightsizingMetricStats'
        warnings:
          type: array
          description: Non-empty when the VM was queried but had no historical metrics data.
          items:
            type: string

    RightsizingReport:
      type: object
      required:
        - id
        - vcenter
        - cluster_id
        - window_start
        - window_end
        - interval_id
        - expected_sample_count
        - vms
        - created_at
      properties:
        id:
          type: string
          description: UUID of the report
        vcenter:
          type: string
          description: vCenter URL used for this collection
        cluster_id:
          type: string
          description: MoRef of the ClusterComputeResource scoped for this collection (empty = all clusters)
        window_start:
          type: string
          format: date-time
        window_end:
          type: string
          format: date-time
        interval_id:
          type: integer
        expected_sample_count:
          type: integer
          description: Theoretical maximum samples for the window (lookback / interval)
        vms:
          type: array
          items:
            $ref: '#/components/schemas/RightsizingVMReport'
        created_at:
          type: string
          format: date-time

    RightsizingReportSummary:
      type: object
      description: Rightsizing report metadata without VM metrics. Use GET /rightsizing/{id} to retrieve the full report including metrics.
      required:
        - id
        - vcenter
        - cluster_id
        - window_start
        - window_end
        - interval_id
        - expected_sample_count
        - created_at
      properties:
        id:
          type: string
          description: UUID of the report
        vcenter:
          type: string
          description: vCenter URL used for this collection
        cluster_id:
          type: string
          description: MoRef of the ClusterComputeResource scoped for this collection (empty = all clusters)
        window_start:
          type: string
          format: date-time
        window_end:
          type: string
          format: date-time
        interval_id:
          type: integer
        expected_sample_count:
          type: integer
          description: Theoretical maximum samples for the window (lookback / interval)
        created_at:
          type: string
          format: date-time

    RightsizingReportListResponse:
      type: object
      required:
        - reports
        - total
      properties:
        reports:
          type: array
          description: List of report summaries. Use GET /rightsizing/{id} for full VM metrics.
          items:
            $ref: '#/components/schemas/RightsizingReportSummary'
        total:
          type: integer
          description: Total number of stored reports

    VmUtilizationDetails:
      type: object
      required:
        - moid
        - vm_name
        - cpu_avg
        - cpu_p95
        - cpu_max
        - cpu_latest
        - mem_avg
        - mem_p95
        - mem_max
        - mem_latest
        - disk
        - confidence
      properties:
        moid:
          type: string
        vm_name:
          type: string
        cpu_avg:
          type: number
          format: double
          description: CPU utilization average (%)
        cpu_p95:
          type: number
          format: double
        cpu_max:
          type: number
          format: double
        cpu_latest:
          type: number
          format: double
        mem_avg:
          type: number
          format: double
          description: Memory utilization average (%)
        mem_p95:
          type: number
          format: double
        mem_max:
          type: number
          format: double
        mem_latest:
          type: number
          format: double
        disk:
          type: number
          format: double
          description: Disk utilization (%)
        confidence:
          type: number
          format: double
          description: Data confidence — sample_count / expected_sample_count × 100

    # --- Forecaster schemas ---

    ForecasterStartRequest:
      type: object
      required:
        - pairs
      properties:
        credentials:
          description: vCenter credentials. Optional if previously provided in an earlier request.
          $ref: '#/components/schemas/VcenterCredentials'
        pairs:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/DatastorePair'
        diskSizeGb:
          type: integer
          description: Disk size in GB for benchmark (default 10)
        iterations:
          type: integer
          description: Number of benchmark iterations per pair (default 5)
        concurrency:
          type: integer
          description: Max parallel pairs (default 1, sequential)

    DatastorePair:
      type: object
      required:
        - name
        - sourceDatastore
        - targetDatastore
      properties:
        name:
          type: string
          description: User-defined name for this pair
        sourceDatastore:
          type: string
          description: Source datastore name
        targetDatastore:
          type: string
          description: Target datastore name
        host:
          type: string
          description: Optional ESXi host name to pin the benchmark to. If omitted, a host common to both datastores is selected automatically.

    ForecasterStatus:
      type: object
      required:
        - state
      properties:
        state:
          type: string
          enum:
            - ready
            - running
          x-enum-varnames:
            - ForecasterStatusStateReady
            - ForecasterStatusStateRunning
          description: Service-level state. Only two states exist — ready (idle) or running (benchmark in progress). When a benchmark finishes or is canceled, the service returns to ready.
        pairs:
          type: array
          items:
            $ref: '#/components/schemas/ForecasterPairStatus'
          description: Per-pair progress (present only when running)

    ForecasterPairStatus:
      type: object
      required:
        - pairName
        - sourceDatastore
        - targetDatastore
        - state
        - completedRuns
        - totalRuns
      properties:
        pairName:
          type: string
        sourceDatastore:
          type: string
        targetDatastore:
          type: string
        host:
          type: string
          description: ESXi host used for the benchmark (user-specified or auto-selected)
        state:
          type: string
          enum:
            - pending
            - preparing
            - running
            - completed
            - error
            - canceled
          x-enum-varnames:
            - ForecasterPairStatusStatePending
            - ForecasterPairStatusStatePreparing
            - ForecasterPairStatusStateRunning
            - ForecasterPairStatusStateCompleted
            - ForecasterPairStatusStateError
            - ForecasterPairStatusStateCanceled
          description: Per-pair state within a benchmark run
        error:
          type: string
          description: Error message when pair state is error
        completedRuns:
          type: integer
          description: Number of completed iterations
        totalRuns:
          type: integer
          description: Total iterations planned
        prepBytesTotal:
          type: integer
          format: int64
          description: Total bytes to upload during preparation (present during preparing state)
        prepBytesUploaded:
          type: integer
          format: int64
          description: Bytes uploaded so far during preparation

    BenchmarkRun:
      type: object
      required:
        - id
        - sessionId
        - pairName
        - sourceDatastore
        - targetDatastore
        - iteration
        - diskSizeGb
        - durationSec
        - throughputMbps
        - createdAt
      properties:
        id:
          type: integer
          format: int64
        sessionId:
          type: integer
          format: int64
        pairName:
          type: string
        sourceDatastore:
          type: string
        targetDatastore:
          type: string
        iteration:
          type: integer
        diskSizeGb:
          type: integer
        prepDurationSec:
          type: number
          format: double
          description: Time spent on disk creation and random fill (iteration 1 only)
        durationSec:
          type: number
          format: double
        throughputMbps:
          type: number
          format: double
        method:
          type: string
          description: Benchmark method used (e.g., vm_native)
        error:
          type: string
          description: Error message if this iteration failed
        createdAt:
          type: string
          format: date-time

    ForecastStats:
      type: object
      required:
        - pairName
        - sampleCount
      properties:
        pairName:
          type: string
        sampleCount:
          type: integer
        meanMbps:
          type: number
          format: double
        medianMbps:
          type: number
          format: double
        minMbps:
          type: number
          format: double
        maxMbps:
          type: number
          format: double
        stddevMbps:
          type: number
          format: double
        ci95LowerMbps:
          type: number
          format: double
          description: Lower bound of 95% confidence interval
        ci95UpperMbps:
          type: number
          format: double
          description: Upper bound of 95% confidence interval
        estimatePer1TB:
          $ref: '#/components/schemas/EstimateRange'

    EstimateRange:
      type: object
      description: Time estimates for migrating 1TB of data
      properties:
        bestCase:
          type: string
          description: Duration string (e.g., "25m40s")
        expected:
          type: string
          description: Duration string (e.g., "26m49s")
        worstCase:
          type: string
          description: Duration string (e.g., "29m12s")

    ForecasterDatastoresRequest:
      type: object
      properties:
        credentials:
          description: vCenter credentials. Optional if previously provided in an earlier request.
          $ref: '#/components/schemas/VcenterCredentials'

    DatastoreDetail:
      type: object
      required:
        - name
        - type
        - capacityGb
        - freeGb
      properties:
        name:
          type: string
        type:
          type: string
          description: Datastore type (VMFS, NFS, VVol, OTHER)
        capacityGb:
          type: number
          format: double
        freeGb:
          type: number
          format: double
        storageVendor:
          type: string
          description: SCSI vendor string (e.g., NETAPP, PURE, DGC)
        storageModel:
          type: string
        storageArrayId:
          type: string
          description: Derived from NAA device ID prefix. Same value means same physical storage array. Absent for NFS and local datastores.
        naaDevices:
          type: array
          items:
            type: string
          description: NAA device identifiers for the datastore's backing LUNs
        capabilities:
          type: array
          items:
            type: string
            enum:
              - copy-offload
              - xcopy
              - rdm
              - vvol
          description: Intrinsic offload capabilities of this datastore based on vendor support

    PairCapabilityRequest:
      type: object
      required:
        - pairs
      properties:
        credentials:
          description: vCenter credentials. Optional if previously provided in an earlier request.
          $ref: '#/components/schemas/VcenterCredentials'
        pairs:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/DatastorePair'

    PairCapability:
      type: object
      required:
        - pairName
        - sourceDatastore
        - targetDatastore
        - capabilities
      properties:
        pairName:
          type: string
        sourceDatastore:
          type: string
        targetDatastore:
          type: string
        capabilities:
          type: array
          items:
            type: string
            enum:
              - copy-offload
              - xcopy
              - rdm
              - vvol
          description: Feasible offload methods for this source-target pair
