name: Jira PR Sync

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches:
      - main
      - 'release-*'

permissions:
  pull-requests: write
  contents: read

jobs:
  sync-jira:
    if: 1 == 2 # The workflow is not working. Disable it for now.
    uses: kubev2v/migration-planner-workflows/.github/workflows/jira-pr-sync.yml@main
    with:
      ticket-prefix: 'ECOPROJECT'
    secrets:
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
